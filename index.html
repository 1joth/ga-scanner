<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gamma Blast Scanner v2.1 (Updated)</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=JetBrains+Mono:wght@300;400;500;700&family=Barlow:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f0f4f8;
  --panel: #ffffff;
  --card: #f7f9fc;
  --card2: #eef2f7;
  --border: #d4dce8;
  --border2: #c0ccda;
  --text: #3a4f66;
  --muted: #8499b0;
  --white: #1a2e44;
  --green: #00875a;
  --green-d: rgba(0,135,90,0.08);
  --green-b: rgba(0,135,90,0.25);
  --amber: #c47f00;
  --amber-d: rgba(196,127,0,0.08);
  --amber-b: rgba(196,127,0,0.28);
  --red: #cc2244;
  --red-d: rgba(204,34,68,0.07);
  --red-b: rgba(204,34,68,0.22);
  --cyan: #0077aa;
  --cyan-d: rgba(0,119,170,0.08);
  --cyan-b: rgba(0,119,170,0.22);
}

* { margin:0; padding:0; box-sizing:border-box; }
body { background: var(--bg); font-family: 'Barlow', sans-serif; color: var(--text); min-height: 100vh; }

.header { background: var(--panel); border-bottom: 1px solid var(--border); padding: 14px 20px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
.logo { display: flex; align-items: center; gap: 12px; }
.logo-icon { width: 36px; height: 36px; background: var(--amber-d); border: 1px solid var(--amber-b); border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 18px; }
.logo-text { font-family: 'Orbitron', sans-serif; font-size: 14px; font-weight: 700; color: var(--white); letter-spacing: 1px; }

.main { display: grid; grid-template-columns: 300px 1fr; min-height: calc(100vh - 57px); }
.sidebar { background: var(--panel); border-right: 1px solid var(--border); overflow-y: auto; padding-bottom: 20px; }
.sidebar-section { border-bottom: 1px solid var(--border); padding: 14px 16px; }
.sid-label { font-family: 'JetBrains Mono', monospace; font-size: 8px; letter-spacing: 3px; color: var(--muted); text-transform: uppercase; margin-bottom: 10px; }

.input-group { margin-bottom: 10px; }
.input-label { font-family: 'JetBrains Mono', monospace; font-size: 9px; color: var(--muted); margin-bottom: 4px; display: flex; justify-content: space-between; }
input { width: 100%; background: var(--card); border: 1px solid var(--border2); border-radius: 5px; padding: 7px 10px; font-family: 'JetBrains Mono', monospace; font-size: 12px; transition: all 0.3s; }
input:focus { border-color: var(--amber); outline: none; }

.scan-btn { width: 100%; padding: 10px; background: var(--amber); border: none; border-radius: 6px; font-family: 'Orbitron', sans-serif; font-size: 11px; font-weight: 700; cursor: pointer; margin-top: 10px; }
.fetch-btn { width: 100%; padding: 9px; background: transparent; border: 1px solid var(--cyan-b); border-radius: 6px; font-family: 'Orbitron', sans-serif; font-size: 10px; font-weight: 700; color: var(--cyan); cursor: pointer; margin-top: 6px; }

.nifty-row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; padding: 14px 20px; border-bottom: 1px solid var(--border); }
.nifty-cell { background: var(--card); border: 1px solid var(--border); border-radius: 6px; padding: 10px 12px; text-align: center; }
.nc-label { font-family: 'JetBrains Mono', monospace; font-size: 8px; color: var(--muted); margin-bottom: 4px; }
.nc-val { font-family: 'Orbitron', monospace; font-size: 14px; font-weight: 700; }

.strike-panel { margin: 14px 20px; background: var(--card); border: 1px solid var(--border2); border-radius: 10px; overflow: hidden; }
.strike-header { padding: 12px 16px; background: var(--card2); border-bottom: 1px solid var(--border); }
.strike-body { padding: 16px; }

.scan-table { width: 100%; border-collapse: collapse; }
.scan-table th { font-family: 'JetBrains Mono', monospace; font-size: 8px; color: var(--muted); text-align: left; padding: 6px 10px; background: var(--card2); }
.scan-table td { font-family: 'JetBrains Mono', monospace; font-size: 11px; padding: 8px 10px; border-bottom: 1px solid var(--border); }

.log-panel { margin: 20px; background: var(--card); border: 1px solid var(--border); border-radius: 8px; max-height: 200px; overflow-y: auto; }
.log-entry { padding: 4px 12px; font-family: 'JetBrains Mono', monospace; font-size: 10px; }
.log-error { color: var(--red); }
.log-success { color: var(--green); }

@media (max-width: 700px) { .main { grid-template-columns: 1fr; } .nifty-row { grid-template-columns: repeat(3, 1fr); } }
</style>
</head>
<body>

<div class="header">
  <div class="logo">
    <div class="logo-icon">⚡</div>
    <div>
      <div class="logo-text">GAMMA BLAST SCANNER</div>
      <div id="expiryLabel" style="font-family:'JetBrains Mono'; font-size:9px; color:var(--muted);">v2.1 · NIFTY LOT: 65 · TUESDAY EXPIRY</div>
    </div>
  </div>
  <div class="clock" id="clock" style="font-family:'JetBrains Mono'; font-weight:700;">--:--:--</div>
</div>

<div class="main">
  <div class="sidebar">
    <div class="sidebar-section">
      <div class="sid-label">Market Inputs</div>
      <div class="input-group">
        <div class="input-label">Nifty Spot</div>
        <input type="number" id="spot" value="23850">
      </div>
      <div class="input-group">
        <div class="input-label">PCR</div>
        <input type="number" id="pcr" value="0.85" step="0.01">
      </div>
      <div class="input-group">
        <div class="input-label">IV Percentile</div>
        <input type="number" id="ivPercentile" value="92">
      </div>
      <div class="input-group">
        <div class="input-label">BB Width %</div>
        <input type="number" id="bbWidth" value="1.1" step="0.1">
      </div>
      <button class="fetch-btn" onclick="fetchLiveData()">🌐 FETCH NSE LIVE DATA</button>
      <div id="fetchStatus" style="font-family:'JetBrains Mono'; font-size:9px; margin-top:5px; text-align:center;"></div>
    </div>

    <div class="sidebar-section">
      <div class="sid-label">Breakout (5-Min)</div>
      <div class="input-group"><div class="input-label">High</div><input type="number" id="dayHigh" value="23900"></div>
      <div class="input-group"><div class="input-label">Low</div><input type="number" id="dayLow" value="23750"></div>
      <div class="input-group"><div class="input-label">Candle Close</div><input type="number" id="cClose" value="23910"></div>
      <div class="input-group"><div class="input-label">ATM Premium</div><input type="number" id="atmPremium" value="45"></div>
      <button class="scan-btn" onclick="runScan()">⚡ RUN SCANNER</button>
    </div>
  </div>

  <div class="content">
    <div class="nifty-row">
      <div class="nifty-cell"><div class="nc-label">SPOT</div><div class="nc-val" id="disp-spot">—</div></div>
      <div class="nifty-cell"><div class="nc-label">PCR</div><div class="nc-val" id="disp-pcr">—</div></div>
      <div class="nifty-cell"><div class="nc-label">IV%</div><div class="nc-val" id="disp-ivp">—</div></div>
      <div class="nifty-cell"><div class="nc-label">BB WIDTH</div><div class="nc-val" id="disp-bb">—</div></div>
      <div class="nifty-cell"><div class="nc-label">LOT SIZE</div><div class="nc-val" style="color:var(--cyan)">65</div></div>
    </div>

    <div class="strike-panel">
      <div class="strike-header"><div id="statusTitle" style="font-family:'Orbitron'; font-size:11px; font-weight:700;">AWAITING SCAN...</div></div>
      <div class="strike-body">
        <table class="scan-table" id="strikeTable">
          <thead><tr><th>STRIKE</th><th>TYPE</th><th>PREMIUM</th><th>CAPITAL (65u)</th><th>VERDICT</th></tr></thead>
          <tbody id="strikeTableBody"></tbody>
        </table>
      </div>
    </div>

    <div class="log-panel" id="logBody"></div>
  </div>
</div>

<script>
const LOT_SIZE = 65; // Updated 2026 Lot Size

function log(msg, type='') {
  const el = document.getElementById('logBody');
  const entry = document.createElement('div');
  entry.className = `log-entry ${type ? 'log-'+type : ''}`;
  entry.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
  el.prepend(entry);
}

async function fetchLiveData() {
  const status = document.getElementById('fetchStatus');
  status.textContent = "Connecting to NSE...";
  status.style.color = "var(--cyan)";
  
  try {
    // Note: In a real browser environment, you'd call your proxy here.
    log("Requesting latest NIFTY Option Chain data...", "info");
    
    // Simulate data update for demo purposes - replace with your specific proxy URL
    setTimeout(() => {
        status.textContent = "✅ Data Loaded Successfully";
        status.style.color = "var(--green)";
        log("NSE Data synced: NIFTY at 23852 | PCR 0.88", "success");
        // Flash effect
        document.getElementById('spot').style.background = 'var(--green-d)';
        setTimeout(() => document.getElementById('spot').style.background = '', 1000);
    }, 1500);

  } catch (e) {
    status.textContent = "⚠ Connection Error";
    log("Failed to fetch NSE data. Check CORS settings.", "error");
  }
}

function runScan() {
  if (window.navigator.vibrate) window.navigator.vibrate(50);
  const spot = parseFloat(document.getElementById('spot').value);
  const pcr = parseFloat(document.getElementById('pcr').value);
  const ivp = parseFloat(document.getElementById('ivPercentile').value);
  const prem = parseFloat(document.getElementById('atmPremium').value);
  const close = parseFloat(document.getElementById('cClose').value);
  const high = parseFloat(document.getElementById('dayHigh').value);

  // Update Display
  document.getElementById('disp-spot').textContent = spot;
  document.getElementById('disp-pcr').textContent = pcr;
  document.getElementById('disp-ivp').textContent = ivp + "%";
  document.getElementById('disp-bb').textContent = document.getElementById('bbWidth').value + "%";

  const tbody = document.getElementById('strikeTableBody');
  tbody.innerHTML = '';

  const isBullish = close > high;
  const verdict = (ivp > 90 && prem <= 60 && isBullish) ? "✅ GO" : "❌ NO TRADE";
  
  document.getElementById('statusTitle').textContent = verdict === "✅ GO" ? "⚡ SIGNAL: BULLISH BREAKOUT" : "🚫 CONDITIONS NOT MET";
  document.getElementById('statusTitle').style.color = verdict === "✅ GO" ? "var(--green)" : "var(--red)";

  // Generate Strike Row
  const atmStrike = Math.round(spot / 100) * 100;
  const row = `<tr>
    <td>${atmStrike}</td>
    <td>${isBullish ? 'CE' : 'PE'}</td>
    <td>₹${prem}</td>
    <td>₹${(prem * LOT_SIZE).toLocaleString()}</td>
    <td style="color:${verdict.includes('✅') ? 'var(--green)' : 'var(--red)'}">${verdict}</td>
  </tr>`;
  tbody.innerHTML = row;
  
  log(`Scan complete. Verdict: ${verdict}`, verdict.includes('✅') ? 'success' : 'error');
}

setInterval(() => {
  document.getElementById('clock').textContent = new Date().toLocaleTimeString();
}, 1000);
</script>
</body>
</html>
