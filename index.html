<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Gamma Blast Scanner v2.1 (Mobile Pro)</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=JetBrains+Mono:wght@400;700&family=Barlow:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f0f4f8; --panel: #ffffff; --card: #f7f9fc; --border: #d4dce8;
  --text: #3a4f66; --muted: #8499b0; --white: #1a2e44; --green: #00875a;
  --amber: #c47f00; --red: #cc2244; --cyan: #0077aa;
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
body { background: var(--bg); font-family: 'Barlow', sans-serif; color: var(--text); min-height: 100vh; }

.header { background: var(--panel); border-bottom: 1px solid var(--border); padding: 12px 16px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
.logo-text { font-family: 'Orbitron', sans-serif; font-size: 13px; font-weight: 700; color: var(--white); }

.main { display: grid; grid-template-columns: 1fr; }
@media (min-width: 700px) { .main { grid-template-columns: 300px 1fr; } }

.sidebar { background: var(--panel); border-right: 1px solid var(--border); padding: 15px; }
.sid-label { font-family: 'JetBrains Mono', monospace; font-size: 9px; letter-spacing: 2px; color: var(--muted); text-transform: uppercase; margin-bottom: 12px; }

.input-group { margin-bottom: 12px; }
.input-label { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--muted); margin-bottom: 4px; }
input { width: 100%; background: var(--card); border: 1px solid #c0ccda; border-radius: 6px; padding: 10px; font-family: 'JetBrains Mono', monospace; font-size: 14px; }

.scan-btn { width: 100%; padding: 14px; background: var(--amber); color: white; border: none; border-radius: 8px; font-family: 'Orbitron', sans-serif; font-size: 12px; font-weight: 700; cursor: pointer; margin-top: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
.fetch-btn { width: 100%; padding: 10px; background: transparent; border: 1px solid var(--cyan); border-radius: 8px; font-family: 'Orbitron', sans-serif; font-size: 10px; color: var(--cyan); cursor: pointer; margin-top: 8px; }

.nifty-row { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; padding: 15px; }
@media (min-width: 400px) { .nifty-row { grid-template-columns: repeat(4, 1fr); } }

.nifty-cell { background: var(--panel); border: 1px solid var(--border); border-radius: 8px; padding: 12px; text-align: center; }
.nc-label { font-size: 9px; color: var(--muted); margin-bottom: 4px; font-weight: 600; }
.nc-val { font-family: 'Orbitron', monospace; font-size: 15px; font-weight: 700; }

.strike-panel { margin: 0 15px 15px; background: var(--panel); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
.strike-header { padding: 12px; background: #f8fafc; border-bottom: 1px solid var(--border); text-align: center; }
.scan-table { width: 100%; border-collapse: collapse; }
.scan-table th { font-size: 9px; color: var(--muted); padding: 8px; background: #f1f5f9; text-align: left; }
.scan-table td { font-family: 'JetBrains Mono', monospace; font-size: 12px; padding: 12px 8px; border-bottom: 1px solid #f1f5f9; }

.log-panel { margin: 15px; background: #1e293b; border-radius: 8px; height: 150px; overflow-y: auto; padding: 10px; color: #94a3b8; font-family: 'JetBrains Mono', monospace; font-size: 10px; }
.log-success { color: #4ade80; }
.log-error { color: #f87171; }
</style>
</head>
<body>

<div class="header">
  <div class="logo-text">⚡ GAMMA BLAST v2.1</div>
  <div id="clock" style="font-family:'JetBrains Mono'; font-size: 12px; font-weight:700;">00:00:00</div>
</div>

<div class="main">
  <div class="sidebar">
    <div class="sid-label">Market Config</div>
    
    <div class="input-group">
      <div class="input-label">Expiry Date</div>
      <input type="text" id="expiryDate" value="15-APR-2026">
    </div>

    <div class="input-group">
      <div class="input-label">Nifty Spot</div>
      <input type="number" id="spot" value="23850">
    </div>

    <div class="input-group">
      <div class="input-label">IV Percentile</div>
      <input type="number" id="ivPercentile" value="92">
    </div>

    <div class="input-group">
      <div class="input-label">ATM Premium</div>
      <input type="number" id="atmPremium" value="45">
    </div>

    <div class="input-group">
      <div class="input-label">Day High (5m)</div>
      <input type="number" id="dayHigh" value="23900">
    </div>

    <div class="input-group">
      <div class="input-label">Candle Close</div>
      <input type="number" id="cClose" value="23910">
    </div>

    <button class="scan-btn" onclick="runScan()">⚡ RUN MOBILE SCAN</button>
    <button class="fetch-btn" onclick="fetchLiveData()">🌐 SYNC LIVE DATA</button>
    <div id="fetchStatus" style="font-size:10px; text-align:center; margin-top:8px;"></div>
  </div>

  <div class="content">
    <div class="nifty-row">
      <div class="nifty-cell"><div class="nc-label">SPOT</div><div class="nc-val" id="disp-spot">—</div></div>
      <div class="nifty-cell"><div class="nc-label">IV%</div><div class="nc-val" id="disp-ivp">—</div></div>
      <div class="nifty-cell"><div class="nc-label">EXPIRY</div><div class="nc-val" id="disp-expiry" style="font-size:10px">—</div></div>
      <div class="nifty-cell"><div class="nc-label">LOT</div><div class="nc-val" style="color:var(--cyan)">65</div></div>
    </div>

    <div class="strike-panel">
      <div class="strike-header"><div id="statusTitle" style="font-family:'Orbitron'; font-size:12px;">READY TO SCAN</div></div>
      <table class="scan-table">
        <thead><tr><th>STRIKE</th><th>TYPE</th><th>PREM</th><th>CAPITAL</th><th>VERDICT</th></tr></thead>
        <tbody id="strikeTableBody"></tbody>
      </table>
    </div>

    <div class="log-panel" id="logBody"></div>
  </div>
</div>

<script>
const LOT_SIZE = 65;

function log(msg, type='') {
  const el = document.getElementById('logBody');
  const entry = document.createElement('div');
  entry.className = type ? 'log-'+type : '';
  entry.innerHTML = `> [${new Date().toLocaleTimeString()}] ${msg}`;
  el.prepend(entry);
}

async function fetchLiveData() {
  const status = document.getElementById('fetchStatus');
  status.textContent = "⏳ SYNCING...";
  status.style.color = "var(--cyan)";
  
  try {
    // 1. Using a more stable proxy for Yahoo Finance
    const symbol = "%5ENSEI"; 
    const targetUrl = `https://query1.finance.yahoo.com/v8/finance/chart/${symbol}`;
    const proxyUrl = `https://corsproxy.io/?${encodeURIComponent(targetUrl)}`;

    const response = await fetch(proxyUrl);
    if (!response.ok) throw new Error('Proxy connection failed');
    
    const data = await response.json();
    const spot = data.chart.result[0].meta.regularMarketPrice;

    // 2. Smart Expiry Logic (Calculates next Tuesday)
    const today = new Date();
    const dayOfWeek = today.getDay(); // 0: Sun, 1: Mon, 2: Tue...
    
    // Calculate days until next Tuesday
    let daysUntilTuesday = (2 - dayOfWeek + 7) % 7;
    
    // If today is Tuesday after market hours, go to next week
    if (daysUntilTuesday === 0 && today.getHours() >= 15 && today.getMinutes() >= 30) {
      daysUntilTuesday = 7;
    }
    
    const expiryDate = new Date();
    expiryDate.setDate(today.getDate() + daysUntilTuesday);

    const day = String(expiryDate.getDate()).padStart(2, '0');
    const month = expiryDate.toLocaleString('en-IN', { month: 'short' }).toUpperCase();
    const year = expiryDate.getFullYear();
    const formattedExpiry = `${day}-${month}-${year}`;

    // 3. Update Inputs
    document.getElementById('spot').value = Math.floor(spot);
    document.getElementById('expiryDate').value = formattedExpiry;
    
    status.textContent = "✅ SYNCED";
    status.style.color = "var(--green)";
    log(`Sync Success: Nifty @ ${spot} | Expiry: ${formattedExpiry}`, "success");
    
  } catch (e) {
    status.textContent = "❌ SYNC FAILED";
    status.style.color = "var(--red)";
    log("Check internet or proxy. Error: " + e.message, "error");
    console.error(e);
  }
}

function runScan() {
  // --- HAPTIC FEEDBACK (Android) ---
  if (navigator.vibrate) navigator.vibrate(150);

  const spot = parseFloat(document.getElementById('spot').value);
  const ivp = parseFloat(document.getElementById('ivPercentile').value);
  const prem = parseFloat(document.getElementById('atmPremium').value);
  const close = parseFloat(document.getElementById('cClose').value);
  const high = parseFloat(document.getElementById('dayHigh').value);
  const expiry = document.getElementById('expiryDate').value;

  // Update Top Display
  document.getElementById('disp-spot').textContent = spot;
  document.getElementById('disp-ivp').textContent = ivp + "%";
  document.getElementById('disp-expiry').textContent = expiry;

  const isBullish = close > high;
  const isC9 = prem <= 60;
  const isC10 = ivp >= 90;
  const verdict = (isC10 && isC9 && isBullish) ? "✅ GO" : "❌ NO TRADE";

  const title = document.getElementById('statusTitle');
  title.textContent = verdict === "✅ GO" ? "🔥 GAMMA BLAST TRIGGERED" : "WAITING FOR SETUP...";
  title.style.color = verdict === "✅ GO" ? "var(--green)" : "var(--red)";

  const atmStrike = Math.round(spot / 100) * 100;
  const tbody = document.getElementById('strikeTableBody');
  tbody.innerHTML = `<tr>
    <td>${atmStrike}</td>
    <td>${isBullish ? 'CE' : 'PE'}</td>
    <td>₹${prem}</td>
    <td>₹${(prem * LOT_SIZE).toLocaleString()}</td>
    <td style="color:${verdict.includes('✅') ? 'var(--green)' : 'var(--red)'}; font-weight:bold;">${verdict}</td>
  </tr>`;

  log(`Scan finished for ${expiry}. Setup: ${verdict}`, verdict.includes('✅') ? 'success' : '');
}

setInterval(() => {
  document.getElementById('clock').textContent = new Date().toLocaleTimeString();
}, 1000);
</script>
</body>
</html>
